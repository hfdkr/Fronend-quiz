<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quiz app - score</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <style type="text/tailwindcss">

        @theme{
            /* colors  */
            --color-White: #FFFFFF;
            --color-black: #000000;
            --color-Grey-500: #626C7F;
            --color-Grey-50: #F4F6FA;
            --color-Blue-950: #2D3949;
            --color-Blue-900: #313E51;
            --color-Blue-850: #3B4D66;
            --color-Blue-500: #306AFF;
            --color-Blue-300: #ABC1E1;
            --color-Blue-100: #EDF1F9;
            --color-Blue-50: #EBF0FF;
            --color-Green-500: #2FD887;
            --color-Green-100: #E0FDEF;
            --color-Purple-600: #A729F5;
            --color-Purple-100: #F6E7FF;
            --color-Orange-400: #FF7E35;
            --color-Orange-50: #FFF5ED;
            --color-red-500: #EE5454;
            /* fonts */
            --font-rubik: "Rubik", sans-serif;
            /* Spacing */
            --spacing-100: 8px;
            --spacing-200: 16px;
            --spacing-300: 24px;
            --spacing-400: 32px;
            --spacing-500: 40px;
            --spacing-600: 48px;
            --spacing-800: 64px;
            --spacing-1600: 128px;
            --spacing-1800: 144px;
            --spacing-2300: 184px;
            /* TEXT PRESET 1 */
            --text-preset-1:  144px;
            --text-preset-1--line-height:   100%;
            /* TEXT PRESET 2 — MEDIUM */
            --text-preset-2-medium:                64px;
            --text-preset-2-medium--line-height:   100%;
            /* TEXT PRESET 2 — LIGHT */
            --text-preset-2-light:                64px;
            --text-preset-2-light--line-height:   100%;
            /* TEXT PRESET 3 */
            --text-preset-3:                36px;
            --text-preset-3--line-height:   120%;
            /* TEXT PRESET 4 */
            --text-preset-4:                28px;
            --text-preset-4--line-height:   100%;
            /* TEXT PRESET 5 — MEDIUM */
            --text-preset-5-medium:                24px;
            --text-preset-5-medium--line-height:   150%;
            /* TEXT PRESET 5 — REGULAR */
            --text-preset-5-regular:                24px;
            --text-preset-5-regular--line-height:   150%;
            /* TEXT PRESET 6 — ITALIC */
            --text-preset-6:                20px;
            --text-preset-6--line-height:   150%;
            /*TEXT PRESET 2 MOBILE MEDIUM*/
            --text-preset-2-mobile: 40px;
            --text-preset-2-mobile-medium--line-height: 100%;
            /*TEXT PRESET 3 MOBILE*/
            --text-preset-3-mobile: 20px;
            --text-preset-3-mobile--line-height: 120%;
            /*TEXT PRESET 4 MOBILE*/
            --text-preset-4-mobile: 18px;
            --text-preset-4-mobile--line-height: 100%;
            /*TEXT PRESET 5 MOBILE*/
            --text-preset-5-mobile: 14px;
            --text-preset-5-mobile--line-height: 150%;
        }
    </style>
</head>

<body class="bg-Blue-900 font-rubik min-h-screen overflow-hidden">

    <main class="relative z-10 min-h-screen flex flex-col px-[24px] pt-[28px] md:px-[64px] lg:px-[140px]">

        <header class="flex items-center justify-between mb-[40px] md:mb-[64px] lg:mb-[80px]">

            <div class="flex items-center gap-[16px]">
                <div
                    class="w-[40px] h-[40px] md:w-[56px] md:h-[56px] bg-Purple-100 rounded-[8px] md:rounded-[12px] flex items-center justify-center flex-shrink-0">
                    <img src="./images/icon_accessibility.png" alt="icon-accessibility"
                        class="w-[24px] h-[24px] md:w-[32px] md:h-[32px]">
                </div>
                <span class="text-preset-4-mobile md:text-preset-4 font-medium text-White">Accessibility</span>
            </div>
            <div class="flex items-center gap-[8px] md:gap-[12px]">
                <img src="./images/icon-1.png" alt="icon-sun" class="md:hidden">
                <img src="./images/icon-tablet.png" alt="icon-sun-tablet" class="hidden md:block">
                <div
                    class="rounded-full bg-Purple-600 w-[32px] h-[20px] md:w-[48px] md:h-[28px] flex items-center justify-end px-[4px]">
                    <div class="w-[12px] h-[12px] md:w-[20px] md:h-[20px] bg-White rounded-full"></div>
                </div>
                <img src="./images/icon-2.png" alt="icon-moon" class="md:hidden">
                <img src="./images/icon-tablet-2.png" alt="icon-moon-tablet" class="hidden md:block">
            </div>

        </header>

        <section class="flex ">

            <div class="lg:flex-1">
                <h2 class="font-light text-White text-preset-2-mobile md:text-preset-2-light leading-none">Quiz
                    completed</h2>
                <h1 class="font-bold text-White text-preset-2-mobile md:text-preset-2-medium leading-none">You scored...
                </h1>
            </div>

            <div class="flex flex-col gap-[12px] md:gap-[16px] lg:flex-1">

                <div
                    class="bg-Blue-850 rounded-[24px] p-[24px] md:p-[48px] flex flex-col items-center gap-[12px] md:gap-[16px]">

                    <div class="flex items-center gap-[16px]">
                        <div
                            class="w-[40px] h-[40px] md:w-[56px] md:h-[56px] bg-Purple-100 rounded-[8px] md:rounded-[12px] flex items-center justify-center flex-shrink-0">
                            <img src="./images/icon_accessibility.png" alt="icon-accessibility"
                                class="w-[24px] h-[24px] md:w-[32px] md:h-[32px]">
                        </div>
                        <span id="subjectName"
                            class="text-preset-4-mobile md:text-preset-4 font-medium text-White">Accessibility</span>
                    </div>

                    <span id="score" class="text-preset-1 font-bold text-White leading-none">0</span>

                    <span class="text-preset-5-mobile md:text-preset-5-regular text-Blue-300">out of 10</span>

                </div>

                <button id="playAgainBtn"
                    class="w-full bg-Purple-600 hover:opacity-80 text-White font-bold text-preset-4-mobile md:text-preset-5-medium rounded-[24px] py-[20px] md:py-[24px] transition-all">
                    Play Again
                </button>

            </div>

        </section>

    </main>

    <script src="answer.js"></script>
</body>

</html>
