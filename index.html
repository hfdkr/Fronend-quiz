<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quiz app</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <style type="text/tailwindcss">

        @theme{
            /* colors  */
            --color-White: #FFFFFF;
            --color-black: #000000;
            --color-Grey-500: #626C7F;
            --color-Grey-50: #F4F6FA;
            --color-Blue-950: #2D3949;
            --color-Blue-900: #313E51;
            --color-Blue-850: #3B4D66;
            --color-Blue-500: #306AFF;
            --color-Blue-300: #ABC1E1;
            --color-Blue-100: #EDF1F9;
            --color-Blue-50: #EBF0FF;
            --color-Green-500: #2FD887;
            --color-Green-100: #E0FDEF;
            --color-Purple-600: #A729F5;
            --color-Purple-100: #F6E7FF;
            --color-Orange-400: #FF7E35;
            --color-Orange-50: #FFF5ED;
            --color-red-500: #EE5454;
            /* fonts */
            --font-rubik: "Rubik", sans-serif;
            /* Spacing */
            --spacing-100: 8px;
            --spacing-200: 16px;
            --spacing-300: 24px;
            --spacing-400: 32px;
            --spacing-500: 40px;
            --spacing-600: 48px;
            --spacing-800: 64px;
            --spacing-1600: 128px;
            --spacing-1800: 144px;
            --spacing-2300: 184px;
            /* TEXT PRESET 1 */
            --text-preset-1:  144px;
            --text-preset-1--line-height:   100%;
            /* text size */
            /* TEXT PRESET 2 — MEDIUM */
            --text-preset-2-medium:                64px;
            --text-preset-2-medium--line-height:   100%;
            /* TEXT PRESET 2 — LIGHT */
            --text-preset-2-light:                64px;
            --text-preset-2-light--line-height:   100%;
            /* TEXT PRESET 3 */
            --text-preset-3:                36px;
            --text-preset-3--line-height:   120%;
            /* TEXT PRESET 4 */
            --text-preset-4:                28px;
            --text-preset-4--line-height:   100%;
            /* TEXT PRESET 5 — MEDIUM */
            --text-preset-5-medium:                24px;
            --text-preset-5-medium--line-height:   150%;
            /* TEXT PRESET 5 — REGULAR */
            --text-preset-5-regular:                24px;
            --text-preset-5-regular--line-height:   150%;
            /* TEXT PRESET 6 — ITALIC */
            --text-preset-6:                20px;
            --text-preset-6--line-height:   150%;
            /*TEXT PRESET 2 MOBILE MEDIUM*/
            --text-preset-2-mobile: 40px;
            --text-preset-2-mobile-medium--line-height: 100%;
            /*TEXT PRESET 3 MOBILE*/
            --text-preset-3-mobile: 20px;
            --text-preset-3-mobile--line-height: 120%;
            /*TEXT PRESET 4 MOBILE*/
            --text-preset-4-mobile: 18px;
            --text-preset-4-mobile--line-height: 100%;
            /*TEXT PRESET 5 MOBILE*/
            --text-preset-5-mobile: 14px;
            --text-preset-5-mobile--line-height: 150%;
        }
    </style>
</head>

<body class="bg-Blue-900">
    <!-- mobile path -->
    <img src="./images/path.svg" alt="path" class="absolute z-0 top md:hidden lg-hidden">
    <!-- tablet designe -->
    <img src="./images/path-2.svg" alt="path-tablet" class="hidden md:block md:absolute md:z-0 md:top-[-150px]">
    <!-- daskctop designe -->
    <img src="./images/path-3.png" alt="path-desktop" class="hidden lg:block lg:absolute lg:z-0 lg:bottom-0 lg:right-0">
    <main class="relative z-10">
        <!-- mobile designe -->
        <div class="flex justify-end gap-[8px] pr-[24px] pt-[28px] md:hidden">
            <img src="./images/icon-1.png" alt="icon-led">
            <div class="rounded-[9px] bg-purple-600 w-[32px] h-[20px] flex items-center justify-end pr-[4px]">
                <div class="w-[12px] h-[12px] bg-white rounded-full"></div>
            </div>
            <img src="./images/icon-2.png" alt="icon-led-2">
        </div>
        <!-- tablet designe -->
        <div class="hidden md:flex md:justify-end md:gap-[8px] md:pr-[24px] pt-[28px] md:block">
            <img src="./images/icon-tablet.png" alt="icon-led">
            <div class="rounded-full bg-purple-600 w-[48px] h-[28px] flex items-center justify-end px-[4px]">
                <div class="w-[20px] h-[20px] bg-white rounded-full"></div>
            </div>
            <img src="./images/icon-tablet-2.png" alt="icon-led-2">
        </div>
        <section class="container my-[0px] mx-auto lg:flex lg:flex-2">
            <div class="pt-[32px] mx-[24px]">
                <h2 class="font-rubik font-light text-white text-preset-2-mobile-2 md:text-preset-2-light">Welcome to the</h2>
                <h1 class="font-rubik text-preset-2-mobile text-white font-medium md:text-preset-2-medium">Frontend Quiz!</h1>
                <span class="font-rubik text-preset-5-mobile text-Blue-300 md:-preset-6">Pick a subject to get started.</span>
            </div>
            <div class="flex flex-col mx-[40px] mt-[40px] gap-3 md:flex-1 md:gap-4">
                <button
                    class="flex items-center gap-4 bg-Blue-850 hover:bg-Blue-900 p-3 rounded-2xl border-2 border-transparent hover:border-Purple-600 hover:translate-y-1 md:p-4">
                    <div
                        class="w-10 h-10 bg-Orange-50 rounded-lg flex items-center justify-center font-bold text-Orange-400 text-xs flex-shrink-0 ">
                        <img src="./images/icon-html.png" alt="icon-html">
                    </div>
                    <span class="text-preset-4-mobile font-medium text-white font-rubik">HTML</span>
                </button>

                <button
                    class="flex items-center gap-4 bg-Blue-850 hover:bg-Blue-900 p-3 rounded-2xl border-2 border-transparent hover:border-Purple-600 hover:-translate-y-1 md:p-4">
                    <div
                        class="w-10 h-10 bg-Orange-50 rounded-lg flex items-center justify-center font-bold text-Orange-400 text-xs flex-shrink-0 ">
                        <img src="images/icon-css.png" alt="icon-css">
                    </div>
                    <span class="text-preset-4-mobile font-medium text-white font-rubik">CSS</span>
                </button>

                <button
                    class="flex items-center gap-4 bg-Blue-850 hover:bg-Blue-900 p-3 rounded-2xl border-2 border-transparent hover:border-Purple-600 hover:-translate-y-1 md:p-4">
                    <div
                        class="w-10 h-10 bg-Orange-50 rounded-lg flex items-center justify-center font-bold text-Orange-400 text-xs flex-shrink-0 ">
                        <img src="images/icon-js.png" alt="icon-js">
                    </div>
                    <span class="text-preset-4-mobile font-rubik font-medium text-white">Javascript</span>
                </button>

                <button
                    class="flex items-center gap-4 bg-Blue-850 hover:bg-Blue-900 p-3 rounded-2xl border-2 border-transparent hover:border-Purple-600 hover:-translate-y-1 md:p-4">
                    <div
                        class="w-10 h-10 bg-Orange-50 rounded-lg flex items-center justify-center font-bold text-Orange-400 text-xs flex-shrink-0 ">
                        <img src="./images/icon_accessibility.png" alt="icon-acces">
                    </div>
                    <span class="text-preset-4-mobile font-medium text-white font-rubik">Accessibility</span>
                </button>
            </div>
        </section>
    </main>
</body>

</html>
